<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6200ea"/>
      <stop offset="100%" style="stop-color:#9c4dcc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ticket shape -->
  <g transform="translate(256,256)">
    <!-- Main ticket body -->
    <rect x="-160" y="-90" width="320" height="180" rx="16" fill="white" opacity="0.95"/>
    <!-- Left notch -->
    <circle cx="-160" cy="0" r="22" fill="#6200ea"/>
    <!-- Right notch -->
    <circle cx="160" cy="0" r="22" fill="#6200ea"/>
    <!-- Dashed divider -->
    <line x1="-120" y1="-60" x2="-120" y2="60" stroke="#e0d0f7" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- T letter -->
    <rect x="-108" y="-36" width="60" height="10" rx="5" fill="#6200ea"/>
    <rect x="-84" y="-26" width="10" height="56" rx="5" fill="#6200ea"/>
    <!-- Decorative lines -->
    <rect x="-40" y="-30" width="120" height="10" rx="5" fill="#9c4dcc" opacity="0.6"/>
    <rect x="-40" y="-10" width="80" height="8" rx="4" fill="#e0d0f7"/>
    <rect x="-40" y="10" width="100" height="8" rx="4" fill="#e0d0f7"/>
    <rect x="-40" y="30" width="60" height="8" rx="4" fill="#e0d0f7"/>
  </g>
</svg>
